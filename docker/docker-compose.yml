# Local development stack.
# For production, deploy each service individually via Coolify.
# See COOLIFY.md for production setup instructions.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: toolpit
      POSTGRES_PASSWORD: toolpit
      POSTGRES_DB: toolpit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toolpit']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://toolpit:toolpit@postgres:5432/toolpit
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_URL: http://localhost:3000
      ADMIN_SECRET: ${ADMIN_SECRET:-dev-admin-secret}
      VOTE_COOKIE_SECRET: ${VOTE_COOKIE_SECRET:-dev-vote-secret-32-chars-minimum!!}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://toolpit:toolpit@postgres:5432/toolpit
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
